# Render Blueprint — BenimÖğretmenim (Postgres + API + Web)
# https://render.com/docs/infrastructure-as-code
#
# Oluşan varsayılan adresler (hizmet adları çakışırsa Render hostu değişebilir; o zaman
# aşağıdaki CORS_ORIGINS ve NEXT_PUBLIC_* değerlerini Dashboard'dan güncelle):
#   API:  https://benim-ogretmenim.onrender.com
#   Web: https://benimogretmenim.onrender.com
#
# API (isteğe bağlı): API_GLOBAL_RATE_LIMIT = IP başına penceredeki maks. istek (varsayılan 800);
#   pencere ms: API_GLOBAL_RATE_WINDOW_MS (varsayılan 60000). Kapatmak için "0".
#   Hariç: GET /health, POST /v1/paytr/callback. Vitest / NODE_ENV=test otomatik devre dışı.
#
# API (isteğe bağlı): API_REQUEST_LOG — üretimde varsayılan açık (tek satır JSON http logu).
#   Kapatmak için "0"; geliştirmede açmak için "1". GET /health ve 200 ise log yazılmaz (gürültü).

databases:
  - name: benimogretmenim-db
    plan: free
    region: frankfurt
    databaseName: benimogretmenim
    postgresMajorVersion: "16"

envVarGroups:
  - name: benimogretmenim-shared
    envVars:
      # Hem API hem Web aynı değeri kullanır (admin proxy).
      - key: ADMIN_API_SECRET
        generateValue: true

services:
  - type: web
    name: benimogretmenim-api
    runtime: node
    plan: free
    region: frankfurt
    branch: main
    rootDir: apps/api
    # db:migrate tsx ile çalışır; tsx prod dependencies içinde tutulur (Render preDeploy ortamında
    # devDependencies her zaman gelmeyebilir).
    buildCommand: npm ci --include=dev && npm run build
    preDeployCommand: npm run db:migrate
    startCommand: npm run start
    healthCheckPath: /health
    envVars:
      - key: NODE_VERSION
        value: "20"
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: benimogretmenim-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_EXPIRES
        value: "7d"
      - key: CORS_ORIGINS
        value: https://benimogretmenim.onrender.com
      - fromGroup: benimogretmenim-shared

  - type: cron
    name: benimogretmenim-group-lessons-settle
    runtime: node
    plan: free
    region: frankfurt
    branch: main
    rootDir: apps/api
    schedule: "*/10 * * * *"
    buildCommand: npm ci --include=dev
    startCommand: npm run -s group-lessons:settle
    envVars:
      - key: NODE_VERSION
        value: "20"
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: benimogretmenim-db
          property: connectionString

  - type: web
    name: benimogretmenim-web
    runtime: node
    plan: free
    region: frankfurt
    branch: main
    rootDir: apps/web
    buildCommand: npm ci --include=dev && npm run build
    startCommand: npm run start
    envVars:
      - key: NODE_VERSION
        value: "20"
      - key: NODE_ENV
        value: production
      - key: NEXT_PUBLIC_API_BASE_URL
        value: https://benim-ogretmenim.onrender.com
      - key: INTERNAL_API_BASE_URL
        value: https://benim-ogretmenim.onrender.com
      - key: NEXT_PUBLIC_SITE_URL
        value: https://benimogretmenim.onrender.com
      - fromGroup: benimogretmenim-shared
