# Render Blueprint — BenimÖğretmenim (Postgres + API + Web)
# https://render.com/docs/infrastructure-as-code
#
# Oluşan varsayılan adresler (hizmet adları çakışırsa Render hostu değişebilir; o zaman
# aşağıdaki CORS_ORIGINS ve NEXT_PUBLIC_* değerlerini Dashboard'dan güncelle):
#   API:  https://benim-ogretmenim.onrender.com
#   Web: https://benimogretmenim.onrender.com
#
# API ve Web servislerinde autoDeploy aciktir; main'e push canli yayini tetikler.
# GitHub deploy hook'lari sadece autoDeploy kapatilirsa veya manuel hook istenirse gerekir.
#
# API (isteğe bağlı): API_GLOBAL_RATE_LIMIT = IP başına penceredeki maks. istek (varsayılan 800);
#   pencere ms: API_GLOBAL_RATE_WINDOW_MS (varsayılan 60000). Kapatmak için "0".
#   Hariç: GET /health, POST /v1/paytr/callback. Vitest / NODE_ENV=test otomatik devre dışı.
#
# API (isteğe bağlı): API_REQUEST_LOG — üretimde varsayılan açık (tek satır JSON http logu).
#   Kapatmak için "0"; geliştirmede açmak için "1". GET /health ve 200 ise log yazılmaz (gürültü).
#
# API (isteğe bağlı): SMOKE_RUN_SECRET — production smoke sonucunu admin audit tablosuna
# yazmak icin GitHub Actions secret'i ile ayni deger olmalidir.

databases:
  - name: benimogretmenim-db
    plan: free
    region: frankfurt
    databaseName: benimogretmenim
    postgresMajorVersion: "16"

envVarGroups:
  - name: benimogretmenim-shared
    envVars:
      # Hem API hem Web aynı değeri kullanır (admin proxy).
      - key: ADMIN_API_SECRET
        generateValue: true

services:
  - type: web
    name: benimogretmenim-api
    runtime: node
    plan: free
    region: frankfurt
    branch: main
    autoDeploy: true
    rootDir: apps/api
    # db:migrate tsx ile çalışır; tsx prod dependencies içinde tutulur (Render preDeploy ortamında
    # devDependencies her zaman gelmeyebilir).
    buildCommand: npm ci --include=dev && npm run build
    # migrate + ilk kurulumda admin@... yoksa oluştur (seed_dev admininden ayrı)
    preDeployCommand: npm run db:migrate && npm run db:seed:bootstrap-admin-if-missing
    startCommand: npm run start
    healthCheckPath: /health
    envVars:
      - key: NODE_VERSION
        value: "20"
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: benimogretmenim-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_EXPIRES
        value: "7d"
      - key: ADMIN_BOOTSTRAP_PASSWORD
        generateValue: true
      - key: SUB_PROMO_MULTIPLIER
        value: "5"
      - key: STUDENT_SUB_ANNUAL_PRICE_MINOR
        value: "150000"
      - key: PAYTR_TEST_MODE
        value: "0"
      - key: PAYTR_DEBUG_ON
        value: "0"
      - key: PAYTR_MERCHANT_ID
        sync: false
      - key: PAYTR_MERCHANT_KEY
        sync: false
      - key: PAYTR_MERCHANT_SALT
        sync: false
      - key: PAYTR_BASE_URL
        value: https://www.paytr.com
      - key: PAYTR_CALLBACK_URL
        sync: false
      - key: PAYTR_OK_URL
        sync: false
      - key: PAYTR_FAIL_URL
        sync: false
      - key: CORS_ORIGINS
        value: https://benimogretmenim.onrender.com
      - key: SMOKE_RUN_SECRET
        sync: false
      # Ödev memnuniyet ödülü öğretmen bu kullanıcının cüzdanından düşer (admin grant ile yükleyin).
      # Dashboard'dan ekleyin: PLATFORM_HOMEWORK_WALLET_USER_ID = <users.id UUID>
      - fromGroup: benimogretmenim-shared

  - type: cron
    name: benimogretmenim-group-lessons-settle
    runtime: node
    plan: free
    region: frankfurt
    branch: main
    rootDir: apps/api
    schedule: "*/10 * * * *"
    buildCommand: npm ci --include=dev
    startCommand: npm run -s group-lessons:settle
    envVars:
      - key: NODE_VERSION
        value: "20"
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: benimogretmenim-db
          property: connectionString

  - type: cron
    name: benimogretmenim-homework-release
    runtime: node
    plan: free
    region: frankfurt
    branch: main
    rootDir: apps/api
    schedule: "*/5 * * * *"
    buildCommand: npm ci --include=dev
    startCommand: npm run -s homework:release-expired
    envVars:
      - key: NODE_VERSION
        value: "20"
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: benimogretmenim-db
          property: connectionString

  - type: cron
    name: benimogretmenim-courses-settle-started
    runtime: node
    plan: free
    region: frankfurt
    branch: main
    rootDir: apps/api
    schedule: "*/10 * * * *"
    buildCommand: npm ci --include=dev
    startCommand: npm run -s courses:settle-started
    envVars:
      - key: NODE_VERSION
        value: "20"
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: benimogretmenim-db
          property: connectionString

  - type: web
    name: benimogretmenim-web
    runtime: node
    plan: free
    region: frankfurt
    branch: main
    autoDeploy: true
    rootDir: apps/web
    buildCommand: npm ci --include=dev && npm run build
    startCommand: npm run start
    envVars:
      - key: NODE_VERSION
        value: "20"
      - key: NODE_ENV
        value: production
      - key: NEXT_PUBLIC_API_BASE_URL
        value: https://benim-ogretmenim.onrender.com
      - key: INTERNAL_API_BASE_URL
        value: https://benim-ogretmenim.onrender.com
      - key: NEXT_PUBLIC_SITE_URL
        value: https://benimogretmenim.onrender.com
      - fromGroup: benimogretmenim-shared
