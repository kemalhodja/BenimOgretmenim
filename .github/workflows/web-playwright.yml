# Next build + Playwright — vitrin / oturumsuz koruma / login formu (@integration hariç).
# Yerel API + seed gerektiren oturum senaryoları burada çalışmaz; bkz. apps/web/e2e/README.md

name: Web Playwright (public E2E)

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

on:
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: web-playwright-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  playwright:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: apps/web/package-lock.json

      - name: Install web dependencies
        working-directory: apps/web
        run: npm ci --include=dev

      - name: Check role / uygulama content
        working-directory: apps/web
        run: |
          npm run check:role-features
          npm run check:uygulama-content

      - name: Build Next.js
        working-directory: apps/web
        env:
          CI: "true"
          NEXT_PUBLIC_API_BASE_URL: https://api.benimogretmenim.com.tr
          INTERNAL_API_BASE_URL: https://api.benimogretmenim.com.tr
          NEXT_PUBLIC_SITE_URL: https://benimogretmenim.com.tr
        run: npm run build

      - name: Install Playwright Chromium
        working-directory: apps/web
        run: npx playwright install --with-deps chromium

      - name: Run Playwright (public — API gerekmez)
        working-directory: apps/web
        env:
          CI: "true"
        run: npm run test:e2e:public
