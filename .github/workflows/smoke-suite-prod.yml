# Üretim API’ye karşı `smoke:suite` (prod-safe; ödeme / PayTR callback POST yok).
#
# Tetikleme:
#   - Haftalık cron (Pazar 02:00 UTC) — yalnızca repo değişkeni açıksa çalışır (aşağıya bakın).
#   - Actions → Bu workflow → Run workflow (api_url varsayılan dolu; tek tık).
#
# Zamanlanmış çalıştırma (cron) için:
#   GitHub → Settings → Secrets and variables → Actions → Variables:
#     ENABLE_SCHEDULED_PROD_SMOKE = true
#   İstemezsen değişkeni tanımlama; cron her hafta “boş” workflow üretir, job atlanır (prod’a vurulmaz).
#
# Hedef URL önceliği:
#   1) workflow_dispatch: api_url (varsayılan prod)
#   2) Secret: SMOKE_API_URL (cron’da farklı host için; boşsa prod varsayılanı)
#   3) Varsayılan: https://api.benimogretmenim.com.tr
#
# İsteğe bağlı secret (staging / ayrı API):
#   SMOKE_API_URL

name: Smoke suite (prod API)

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

on:
  schedule:
    - cron: "0 2 * * 0"
  workflow_dispatch:
    inputs:
      api_url:
        description: "API kök URL (sonunda / olmasın)"
        required: false
        default: "https://api.benimogretmenim.com.tr"
        type: string

permissions:
  contents: read

concurrency:
  group: smoke-suite-prod
  cancel-in-progress: false

jobs:
  smoke-suite:
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch' || vars.ENABLE_SCHEDULED_PROD_SMOKE == 'true'
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: apps/api/package-lock.json

      - name: Install API dependencies
        working-directory: apps/api
        run: npm ci --include=dev

      - name: Run smoke suite
        working-directory: apps/api
        env:
          SMOKE_API_URL_SECRET: ${{ secrets.SMOKE_API_URL }}
        run: |
          set -euo pipefail
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            export SMOKE_API_URL="${{ github.event.inputs.api_url }}"
          elif [ -n "${SMOKE_API_URL_SECRET:-}" ]; then
            export SMOKE_API_URL="${SMOKE_API_URL_SECRET}"
          else
            export SMOKE_API_URL="https://api.benimogretmenim.com.tr"
          fi
          echo "::notice::SMOKE_API_URL=${SMOKE_API_URL}"
          npm run smoke:suite

      - name: Report smoke suite result (optional)
        if: always()
        working-directory: apps/api
        env:
          SMOKE_API_URL: ${{ env.SMOKE_API_URL || 'https://api.benimogretmenim.com.tr' }}
          SMOKE_RUN_SECRET: ${{ secrets.SMOKE_RUN_SECRET }}
          SMOKE_WORKFLOW: smoke-suite-prod
          SMOKE_SUITE: smoke:suite
          SMOKE_STATUS: ${{ job.status == 'success' && 'ok' || 'failed' }}
          GITHUB_RUN_ID: ${{ github.run_id }}
          GITHUB_SHA: ${{ github.sha }}
        run: npx tsx src/scripts/report-smoke-run.ts
