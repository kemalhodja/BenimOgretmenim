# Push sonrası: önce build doğrula, sonra Render deploy hook ile canlı deploy tetikle.
# Deploy hook: Render → ilgili Web Service → Settings → Deploy Hook → URL kopyala
# (GET veya POST; https://render.com/docs/deploy-hooks)
#
# GitHub → Repo → Settings → Secrets and variables → Actions → New repository secret:
#   RENDER_DEPLOY_HOOK_API   → API servisinin hook URL'si
#   RENDER_DEPLOY_HOOK_WEB   → Web (Next) servisinin hook URL'si
#
# Render'da aynı repoya "Auto Deploy: On" açıksa, push zaten deploy eder; bu workflow
# da hook çağırırsa çift deploy olabilir. Ya Auto Deploy'u kapat, ya bu workflow'u
# sadece hook istediğin senaryoda kullan.
#
# Not: secrets.* ifadesi adım düzeyinde `if:` içinde kullanılamaz (workflow invalid).
# Hook koşulu env + shell ile yapılır.

name: Build and deploy (Render)

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-render-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: API — install, test, build
        working-directory: apps/api
        run: npm ci --include=dev && npm run test && npm run build

      - name: Web — install, lint, build
        working-directory: apps/web
        env:
          CI: "true"
          NEXT_PUBLIC_API_BASE_URL: https://benim-ogretmenim.onrender.com
          INTERNAL_API_BASE_URL: https://benim-ogretmenim.onrender.com
          NEXT_PUBLIC_SITE_URL: https://benimogretmenim.onrender.com
          NEXT_TELEMETRY_DISABLED: "1"
        run: npm ci --include=dev && npm run lint && npm run build

  deploy:
    needs: [build]
    runs-on: ubuntu-latest
    # PR'larda sadece build; deploy yalnızca main push veya manuel tetikleme
    if: github.ref == 'refs/heads/main' && (github.event_name == 'push' || github.event_name == 'workflow_dispatch')
    steps:
      - name: Trigger Render deploy hooks
        env:
          HOOK_API: ${{ secrets.RENDER_DEPLOY_HOOK_API }}
          HOOK_WEB: ${{ secrets.RENDER_DEPLOY_HOOK_WEB }}
        run: |
          set -euo pipefail
          if [ -z "${HOOK_API:-}" ] && [ -z "${HOOK_WEB:-}" ]; then
            echo "::notice::Render deploy hook secret'ları tanımlı değil; hook atlandı."
            echo "İsterseniz GitHub Secrets: RENDER_DEPLOY_HOOK_API, RENDER_DEPLOY_HOOK_WEB"
            exit 0
          fi
          if [ -n "${HOOK_API:-}" ]; then
            curl -fsS "$HOOK_API"
          fi
          if [ -n "${HOOK_WEB:-}" ]; then
            curl -fsS "$HOOK_WEB"
          fi
