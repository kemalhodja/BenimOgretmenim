# Push sonrası: önce build doğrula, sonra Render deploy hook ile canlı deploy tetikle.
# Deploy hook: Render → ilgili Web Service → Settings → Deploy Hook → URL kopyala
# (GET veya POST; https://render.com/docs/deploy-hooks)
#
# GitHub → Repo → Settings → Secrets and variables → Actions → New repository secret:
#   RENDER_DEPLOY_HOOK_API   → API servisinin hook URL'si
#   RENDER_DEPLOY_HOOK_WEB   → Web (Next) servisinin hook URL'si
#
# render.yaml API/Web servisleri icin autoDeploy: true tutar; main push zaten deploy eder.
# Hook secret'lari opsiyoneldir ve sadece Render autoDeploy kapatilirsa gerekir.
#
# Smoke sonucu API'ye yazilsin istenirse GitHub Actions secret'i SMOKE_RUN_SECRET,
# Render API servisindeki SMOKE_RUN_SECRET ile ayni deger olmalidir.
#
# Not: secrets.* ifadesi adım düzeyinde `if:` içinde kullanılamaz (workflow invalid).
# Hook koşulu env + shell ile yapılır.

name: Build and deploy (Render)

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-render-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: "20"

      - name: API — install, test, build
        working-directory: apps/api
        run: npm ci --include=dev && npm run test && npm run build

      - name: Web — install, lint, build
        working-directory: apps/web
        env:
          CI: "true"
          NEXT_PUBLIC_API_BASE_URL: https://api.benimogretmenim.com.tr
          INTERNAL_API_BASE_URL: https://api.benimogretmenim.com.tr
          NEXT_PUBLIC_SITE_URL: https://benimogretmenim.com.tr
          NEXT_TELEMETRY_DISABLED: "1"
        run: npm ci --include=dev && npm run lint && npm run build

  deploy:
    needs: [build]
    runs-on: ubuntu-latest
    # PR'larda sadece build; deploy yalnızca main push veya manuel tetikleme
    if: github.ref == 'refs/heads/main' && (github.event_name == 'push' || github.event_name == 'workflow_dispatch')
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: apps/api/package-lock.json

      - name: Trigger Render deploy hooks
        env:
          HOOK_API: ${{ secrets.RENDER_DEPLOY_HOOK_API }}
          HOOK_WEB: ${{ secrets.RENDER_DEPLOY_HOOK_WEB }}
        run: |
          set -euo pipefail
          if [ -z "${HOOK_API:-}" ] && [ -z "${HOOK_WEB:-}" ]; then
            echo "::notice::Render deploy hook secret'ları tanımlı değil; render.yaml autoDeploy=true olduğu için hook atlandı."
            echo "AutoDeploy kapatılırsa GitHub Secrets: RENDER_DEPLOY_HOOK_API, RENDER_DEPLOY_HOOK_WEB"
            exit 0
          fi
          if [ -n "${HOOK_API:-}" ]; then
            curl -fsS "$HOOK_API"
          fi
          if [ -n "${HOOK_WEB:-}" ]; then
            curl -fsS "$HOOK_WEB"
          fi

      - name: Install API smoke dependencies
        working-directory: apps/api
        run: npm ci --include=dev

      - name: Wait until API health is ready
        env:
          SMOKE_API_URL: https://benim-ogretmenim.onrender.com
          SMOKE_API_URL_CUSTOM: https://api.benimogretmenim.com.tr
          SMOKE_RUN_SECRET: ${{ secrets.SMOKE_RUN_SECRET }}
          GITHUB_RUN_ID_VALUE: ${{ github.run_id }}
          GITHUB_SHA_VALUE: ${{ github.sha }}
        run: |
          set -euo pipefail
          check_health() {
            curl -fsS "$1/health" | node -e "let s='';process.stdin.on('data',d=>s+=d);process.stdin.on('end',()=>{const j=JSON.parse(s); if (j.db !== true) process.exit(2);})"
          }
          URLS=("$SMOKE_API_URL")
          if [ -n "${SMOKE_API_URL_CUSTOM:-}" ]; then
            URLS=("$SMOKE_API_URL_CUSTOM" "$SMOKE_API_URL")
          fi
          for url in "${URLS[@]}"; do
            for i in $(seq 1 30); do
              if check_health "$url"; then
                echo "API health ready at ${url} after attempt ${i}."
                echo "SMOKE_API_URL=${url}" >> "$GITHUB_ENV"
                exit 0
              fi
              echo "API health not ready at ${url} (${i}/30); waiting 10s..."
              sleep 10
            done
            echo "Timed out waiting for ${url}."
          done
          if [ -n "${SMOKE_RUN_SECRET:-}" ]; then
            payload="$(node -e "console.log(JSON.stringify({status:'failed', targetUrl: process.env.SMOKE_API_URL, workflow: 'deploy-render', runId: process.env.GITHUB_RUN_ID_VALUE, commitSha: process.env.GITHUB_SHA_VALUE, details: {source:'deploy-render', suite:'health-wait', error:'api_health_not_ready'}}))")"
            curl -fsS -X POST "${SMOKE_API_URL}/v1/admin/smoke-runs" \
              -H "content-type: application/json" \
              -H "x-smoke-run-secret: ${SMOKE_RUN_SECRET}" \
              --data "${payload}" || true
          fi
          echo "::error::API health did not become ready before smoke."
          exit 1

      - name: Run production smoke and report result
        working-directory: apps/api
        env:
          SMOKE_API_URL: ${{ env.SMOKE_API_URL }}
          SMOKE_RUN_SECRET: ${{ secrets.SMOKE_RUN_SECRET }}
          GITHUB_RUN_ID_VALUE: ${{ github.run_id }}
          GITHUB_SHA_VALUE: ${{ github.sha }}
        run: |
          set -euo pipefail
          if [ -z "${SMOKE_API_URL:-}" ]; then
            SMOKE_API_URL="https://benim-ogretmenim.onrender.com"
          fi
          export SMOKE_API_URL
          status="ok"
          details='{"source":"deploy-render","suite":"smoke:prod"}'
          if ! npm run smoke:prod; then
            status="failed"
            details='{"source":"deploy-render","suite":"smoke:prod","error":"smoke_prod_failed"}'
          fi
          if [ -n "${SMOKE_RUN_SECRET:-}" ]; then
            export SMOKE_STATUS="${status}"
            export SMOKE_DETAILS="${details}"
            payload="$(node -e "console.log(JSON.stringify({status: process.env.SMOKE_STATUS, targetUrl: process.env.SMOKE_API_URL, workflow: 'deploy-render', runId: process.env.GITHUB_RUN_ID_VALUE, commitSha: process.env.GITHUB_SHA_VALUE, details: JSON.parse(process.env.SMOKE_DETAILS || '{}')}))")"
            curl -fsS -X POST "${SMOKE_API_URL}/v1/admin/smoke-runs" \
              -H "content-type: application/json" \
              -H "x-smoke-run-secret: ${SMOKE_RUN_SECRET}" \
              --data "${payload}"
          else
            echo "::notice::SMOKE_RUN_SECRET tanımlı değil; smoke sonucu API health'e yazılmadı."
          fi
          if [ "${status}" = "failed" ]; then
            exit 1
          fi
