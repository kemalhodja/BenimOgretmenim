# Playwright @integration — PostgreSQL + migrate + seed + API + web build + oturumlu E2E
# Ders videoları, öğrenci/öğretmen/veli panelleri vb.

name: Web Playwright (integration E2E)

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

on:
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: web-playwright-integration-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  integration-e2e:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: benim
          POSTGRES_PASSWORD: benim_dev_change_me
          POSTGRES_DB: benimogretmenim
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U benim -d benimogretmenim"
          --health-interval 4s
          --health-timeout 5s
          --health-retries 30

    env:
      DATABASE_URL: postgres://benim:benim_dev_change_me@127.0.0.1:5432/benimogretmenim
      JWT_SECRET: ci-jwt-secret-must-be-at-least-32-characters-long
      NODE_ENV: development
      PORT: "3002"
      ADMIN_BOOTSTRAP_PASSWORD: ci-admin-password-only-for-ephemeral-postgres
      PLAYWRIGHT_BASE_URL: http://127.0.0.1:3000
      NEXT_PUBLIC_API_BASE_URL: http://127.0.0.1:3002
      NEXT_PUBLIC_SITE_URL: http://127.0.0.1:3000
      WEB_ALLOW_HTTP: "1"
      CI: "true"

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: |
            apps/api/package-lock.json
            apps/web/package-lock.json

      - name: Install API dependencies
        working-directory: apps/api
        run: npm ci --include=dev

      - name: DB migrate + seed
        working-directory: apps/api
        run: |
          npm run db:migrate
          npm run db:verify:lesson-videos
          npm run db:seed
          npm run db:seed:admin

      - name: Build API
        working-directory: apps/api
        run: npm run build

      - name: Start API and wait for health
        working-directory: apps/api
        run: |
          set -euo pipefail
          node dist/index.js &
          echo "API_PID=$!" >> "$GITHUB_ENV"
          for i in $(seq 1 90); do
            if curl -fsS "http://127.0.0.1:3002/health" | grep -qE '"db"\s*:\s*true'; then
              echo "API healthy (db=true)"
              exit 0
            fi
            sleep 1
          done
          echo "::error::API health timeout"
          exit 1

      - name: Install web dependencies
        working-directory: apps/web
        run: npm ci --include=dev

      - name: Build Next.js
        working-directory: apps/web
        run: npm run build

      - name: Install Playwright Chromium
        working-directory: apps/web
        run: npx playwright install --with-deps chromium

      - name: Run Playwright @integration
        working-directory: apps/web
        run: npm run test:e2e:integration

      - name: Stop API
        if: always()
        run: kill "$API_PID" 2>/dev/null || true
