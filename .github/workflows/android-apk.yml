name: Build Android APK

on:
  workflow_dispatch:
  pull_request:
    branches: [main]
    paths:
      - "apps/twa-android/**"
      - "apps/web/app/manifest.ts"
      - "apps/web/public/.well-known/assetlinks.json"
      - ".github/workflows/android-apk.yml"

jobs:
  build-apk:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - uses: android-actions/setup-android@v3

      - uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: "8.13"

      - name: Build debug and unsigned release APKs
        working-directory: apps/twa-android
        run: gradle :app:assembleDebug :app:assembleRelease

      - name: Upload APK artifacts
        uses: actions/upload-artifact@v4
        with:
          name: benimogretmenim-android-apks
          path: |
            apps/twa-android/app/build/outputs/apk/debug/*.apk
            apps/twa-android/app/build/outputs/apk/release/*.apk
          if-no-files-found: error
